<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webglut Pro BG Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex flex-col items-center justify-center min-h-screen p-4 font-sans">
    
    <div class="bg-white p-8 rounded-[2rem] shadow-2xl text-center w-full max-w-md border border-slate-200 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-600 to-indigo-600"></div>

        <h1 class="text-3xl font-black mb-1 text-slate-800 mt-2">Webglut AI Remover</h1>
        <p class="text-xs text-blue-600 font-bold mb-8 tracking-wider uppercase">Optimized Cloud AI Engine</p>
        
        <input type="file" id="upload" accept="image/*" class="hidden">
        <label for="upload" id="uploadLabel" class="bg-blue-600 text-white px-6 py-4 rounded-2xl cursor-pointer hover:bg-blue-700 transition-all font-bold shadow-[0_8px_20px_rgba(37,99,235,0.25)] block w-full active:scale-95">
            Select Photo
        </label>
        
        <div id="status" class="hidden flex-col items-center justify-center mt-8">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-blue-200 border-t-blue-600 rounded-full mb-3"></div>
            <p id="statusText" class="text-blue-600 font-bold text-sm">Optimizing & Uploading... ☁️</p>
        </div>
        
        <div id="resultBox" class="hidden mt-8 animate-fade-in">
            <div class="bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] bg-slate-100 rounded-xl p-3 border-2 border-dashed border-slate-300">
                <img id="resultImage" class="w-full rounded-lg max-h-64 object-contain" src="" alt="Result">
            </div>
            <a id="downloadBtn" href="" download="webglut-removed-bg.png" class="mt-5 block bg-slate-900 text-white px-6 py-4 rounded-2xl font-bold shadow-lg w-full hover:bg-slate-800 transition-all active:scale-95">
                Download Image
            </a>
        </div>
    </div>

    <script>
        const SERVER_URL = 'https://bg-remove-8a9q.onrender.com/remove-bg';

        const upload = document.getElementById('upload');
        const status = document.getElementById('status');
        const statusText = document.getElementById('statusText');
        const resultBox = document.getElementById('resultBox');
        const resultImage = document.getElementById('resultImage');
        const downloadBtn = document.getElementById('downloadBtn');
        const uploadLabel = document.getElementById('uploadLabel');

        // Image Resize Function (Server crash rokne ke liye)
        function compressImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = event => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round((height *= maxWidth / width));
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round((width *= maxHeight / height));
                                height = maxHeight;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg' }));
                        }, 'image/jpeg', quality);
                    };
                };
                reader.onerror = error => reject(error);
            });
        }

        upload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            resultBox.classList.add('hidden');
            status.classList.remove('hidden');
            status.classList.add('flex');
            uploadLabel.classList.add('opacity-50', 'pointer-events-none');
            
            try {
                // Photo ko server par bhejne se pehle resize karna (Max 800px)
                statusText.innerText = "Optimizing Image... ⚡";
                const compressedFile = await compressImage(file, 800, 800, 0.8);
                
                const formData = new FormData();
                formData.append('image', compressedFile);

                statusText.innerText = "Processing AI Magic... ✨";
                
                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Server error");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                resultImage.src = url;
                downloadBtn.href = url;

                status.classList.add('hidden');
                status.classList.remove('flex');
                resultBox.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                statusText.innerText = "Upload failed. Refresh and try again.";
                statusText.classList.replace('text-blue-600', 'text-red-500');
                document.querySelector('.animate-spin').classList.add('hidden');
                
                setTimeout(() => {
                    status.classList.add('hidden');
                    status.classList.remove('flex');
                    statusText.innerText = "Optimizing & Uploading... ☁️";
                    statusText.classList.replace('text-red-500', 'text-blue-600');
                    document.querySelector('.animate-spin').classList.remove('hidden');
                }, 4000);
            } finally {
                uploadLabel.classList.remove('opacity-50', 'pointer-events-none');
            }
        });
    </script>
</body>
</html>
